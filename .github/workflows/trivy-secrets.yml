name: CI - Trivy Secret Scan

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  trivy-secret-scan:
    name: Scan repo for secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy secret scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          format: table
          exit-code: 1
          hide-progress: false

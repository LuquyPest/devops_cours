services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped
    command:
      - --api.dashboard=true
      - --log.level=DEBUG
      - --accesslog=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=glpi_monitoring
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - monitoring
    labels:
      - traefik.enable=true
      - traefik.docker.network=glpi_monitoring
      - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DOMAIN}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.middlewares=traefik-auth
      - traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_BASIC_AUTH}

  mariadb:
    image: mariadb:11
    container_name: glpi-mariadb
    restart: unless-stopped
    environment:
      TZ: Europe/Paris
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p${DB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  glpi:
    image: glpi/glpi:latest
    container_name: glpi
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      TZ: Europe/Paris
      TIMEZONE: Europe/Paris

      # Connexion DB
      GLPI_DB_HOST: glpi-mariadb
      GLPI_DB_PORT: 3306
      GLPI_DB_NAME: ${DB_NAME}
      GLPI_DB_USER: ${DB_USER}
      GLPI_DB_PASSWORD: ${DB_PASSWORD}

      # Auto-install
      GLPI_INSTALL_AUTO: "true"
      GLPI_INSTALL_FORCE: "true"

      # Compte admin GLPI
      GLPI_ADMIN_USER: ${GLPI_ADMIN_USER}
      GLPI_ADMIN_PASSWORD: ${GLPI_ADMIN_PASSWORD}
    volumes:
      - glpi_config:/var/www/glpi/config
      - glpi_files:/var/glpi
    networks:
      - internal
      - monitoring
    labels:
      - traefik.enable=true
      - traefik.docker.network=glpi_monitoring
      - traefik.http.routers.glpi.rule=Host(`${GLPI_DOMAIN}`)
      - traefik.http.routers.glpi.entrypoints=websecure
      - traefik.http.routers.glpi.tls.certresolver=letsencrypt
      - traefik.http.services.glpi.loadbalancer.server.port=80

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - kuma_data:/app/data
    networks:
      - monitoring
    labels:
      - traefik.enable=true
      - traefik.docker.network=glpi_monitoring
      - traefik.http.routers.kuma.rule=Host(`${KUMA_DOMAIN}`)
      - traefik.http.routers.kuma.entrypoints=websecure
      - traefik.http.routers.kuma.tls=true
      - traefik.http.routers.kuma.tls.certresolver=letsencrypt
      - traefik.http.services.kuma.loadbalancer.server.port=3001
volumes:
  traefik_letsencrypt:
  mariadb_data:
  glpi_config:
  glpi_files:
  kuma_data:

networks:
  internal:
    name: glpi_internal
    internal: true

  monitoring:
    name: glpi_monitoring
    driver: bridge

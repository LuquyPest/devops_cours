services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped  # Redémarre automatiquement sauf si stoppé manuellement

    command:
      - --api.dashboard=true  # Active le dashboard Traefik
      - --log.level=DEBUG     # Niveau de logs (DEBUG = très verbeux)
      - --accesslog=true      # Active les logs d'accès HTTP

      - --providers.docker=true  # Permet à Traefik de lire les containers Docker
      - --providers.docker.exposedbydefault=false  # N'expose pas automatiquement tous les containers
      - --providers.docker.network=glpi_monitoring  # Réseau utilisé par Traefik

      - --entrypoints.web.address=:80   # Entrée HTTP
      - --entrypoints.websecure.address=:443  # Entrée HTTPS

      # Redirection automatique HTTP -> HTTPS
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https

      # Configuration Let's Encrypt
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web

    ports:
      - "80:80"    # HTTP
      - "443:443"  # HTTPS

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro  # Permet à Traefik de lire Docker
      - traefik_letsencrypt:/letsencrypt  # Stockage des certificats SSL

    networks:
      - monitoring  # Réseau exposé

    labels:
      - traefik.enable=true  # Active Traefik pour ce container
      - traefik.docker.network=glpi_monitoring

      # Route vers le dashboard
      - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DOMAIN}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls.certresolver=letsencrypt

      - traefik.http.routers.traefik.service=api@internal  # Dashboard interne

      # Protection du dashboard avec un login/mot de passe
      - traefik.http.routers.traefik.middlewares=traefik-auth
      - traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_BASIC_AUTH}

  mariadb:
    image: mariadb:11
    container_name: glpi-mariadb
    restart: unless-stopped

    environment:
      TZ: Europe/Paris
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}  # Mot de passe root
      MARIADB_DATABASE: ${DB_NAME}                # Base créée automatiquement
      MARIADB_USER: ${DB_USER}                    # Utilisateur
      MARIADB_PASSWORD: ${DB_PASSWORD}            # Mot de passe utilisateur

    command:
      - --character-set-server=utf8mb4       # Support complet UTF-8
      - --collation-server=utf8mb4_unicode_ci

    volumes:
      - mariadb_data:/var/lib/mysql  # Stockage persistant des données

    networks:
      - internal  # Réseau interne (non exposé)

    healthcheck:
      # Vérifie que MariaDB est prêt avant de lancer GLPI
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p${DB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  glpi:
    image: glpi/glpi:latest
    container_name: glpi
    restart: unless-stopped

    depends_on:
      mariadb:
        condition: service_healthy  # Attend que MariaDB soit OK

    environment:
      TZ: Europe/Paris
      TIMEZONE: Europe/Paris

      # Connexion à la base
      GLPI_DB_HOST: glpi-mariadb
      GLPI_DB_PORT: 3306
      GLPI_DB_NAME: ${DB_NAME}
      GLPI_DB_USER: ${DB_USER}
      GLPI_DB_PASSWORD: ${DB_PASSWORD}

      # Installation automatique de GLPI
      GLPI_INSTALL_AUTO: "true"
      GLPI_INSTALL_FORCE: "true"

      # Création du compte admin
      GLPI_ADMIN_USER: ${GLPI_ADMIN_USER}
      GLPI_ADMIN_PASSWORD: ${GLPI_ADMIN_PASSWORD}

    volumes:
      - glpi_config:/var/www/glpi/config  # Config GLPI
      - glpi_files:/var/glpi              # Fichiers GLPI

    networks:
      - internal    # DB
      - monitoring  # Accès via Traefik

    labels:
      - traefik.enable=true
      - traefik.docker.network=glpi_monitoring

      # Accès via domaine
      - traefik.http.routers.glpi.rule=Host(`${GLPI_DOMAIN}`)
      - traefik.http.routers.glpi.entrypoints=websecure
      - traefik.http.routers.glpi.tls.certresolver=letsencrypt

      # Port interne de GLPI
      - traefik.http.services.glpi.loadbalancer.server.port=80

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped

    volumes:
      - kuma_data:/app/data  # Données de monitoring

    networks:
      - monitoring

    labels:
      - traefik.enable=true
      - traefik.docker.network=glpi_monitoring

      # Accès via domaine
      - traefik.http.routers.kuma.rule=Host(`${KUMA_DOMAIN}`)
      - traefik.http.routers.kuma.entrypoints=websecure
      - traefik.http.routers.kuma.tls=true
      - traefik.http.routers.kuma.tls.certresolver=letsencrypt

      # Port de l'app
      - traefik.http.services.kuma.loadbalancer.server.port=3001

volumes:
  traefik_letsencrypt:  # Certificats SSL
  mariadb_data:         # Données DB
  glpi_config:          # Config GLPI
  glpi_files:           # Fichiers GLPI
  kuma_data:            # Données Uptime Kuma

networks:
  internal:
    name: glpi_internal
    internal: true  # Réseau non accessible depuis l'extérieur

  monitoring:
    name: glpi_monitoring
    driver: bridge  # Réseau exposé pour Traefik
